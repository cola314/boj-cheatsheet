<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BOJ 치트시트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --base-font-family: -apple-system, 'Noto Sans KR', sans-serif;
      --base-font-size: 15px;
      --code-font-family: 'JetBrains Mono', 'D2Coding', 'Fira Code', monospace;
      --code-font-size: 13px;
      --theme-color: #2563eb;
      --sidebar-width: 240px;
    }
    .markdown-section pre {
      border-radius: 6px;
      background: #2d2d2d !important;
    }
    .markdown-section pre > code {
      color: #ccc !important;
      text-shadow: none !important;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'BOJ 치트시트',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
        paths: 'auto',
      },
      auto2top: true,
      coverpage: false,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script>
    // C 언어 문법 등록 (cpp의 의존성)
    Prism.languages.c = Prism.languages.extend('clike', {
      'comment': {pattern: /\/\/(?:[^\r\n\\]|\\(?:\r\n?|\n|(?![\r\n])))*|\/\*[\s\S]*?(?:\*\/|$)/, greedy: true},
      'string': {pattern: /"(?:\\(?:\r\n|[\s\S])|[^"\\\r\n])*"/, greedy: true},
      'class-name': {pattern: /(\b(?:enum|struct)\s+(?:__attribute__\s*\([\s\S]*?\)\s*)?)\w+|\b[a-z]\w*_t\b/, lookbehind: true},
      'keyword': /\b(?:_Alignas|_Alignof|_Atomic|_Bool|_Complex|_Generic|_Imaginary|_Noreturn|_Static_assert|_Thread_local|__attribute__|asm|auto|break|case|char|const|continue|default|do|double|else|enum|extern|float|for|goto|if|inline|int|long|register|return|short|signed|sizeof|static|struct|switch|typedef|typeof|union|unsigned|void|volatile|while)\b/,
      'function': /\b[a-z_]\w*(?=\s*\()/i,
      'number': /(?:\b0x(?:[\da-f]+(?:\.[\da-f]*)?|\.[\da-f]+)(?:p[+-]?\d+)?|(?:\b\d+(?:\.\d*)?|\B\.\d+)(?:e[+-]?\d+)?)[ful]{0,4}/i,
      'operator': />>=?|<<=?|->|([-+&|:])\1|[?:~]|[-+*/%&|^!=<>]=?/
    });
    // C++ 문법 등록
    Prism.languages.cpp = Prism.languages.extend('c', {
      'class-name': [{pattern: /(\b(?:class|concept|enum|struct|typename)\s+)(?!final)\w+/, lookbehind: true}, /\b[A-Z]\w*(?=\s*::\s*\w+\s*\()/, /\b[A-Z_]\w*(?=\s*::\s*~\w+\s*\()/i],
      'keyword': /\b(?:alignas|alignof|asm|auto|bool|break|case|catch|char|char16_t|char32_t|char8_t|class|co_await|co_return|co_yield|compl|concept|const|const_cast|consteval|constexpr|constinit|continue|decltype|default|delete|do|double|dynamic_cast|else|enum|explicit|export|extern|final|float|for|friend|goto|if|import|inline|int|long|module|mutable|namespace|new|noexcept|nullptr|operator|override|private|protected|public|register|reinterpret_cast|requires|return|short|signed|sizeof|static|static_assert|static_cast|struct|switch|template|this|thread_local|throw|try|typedef|typeid|typename|union|unsigned|using|virtual|void|volatile|wchar_t|while)\b/,
      'number': {pattern: /(?:\b0b[01']+|\b0x(?:[\da-f']+(?:\.[\da-f']*)?|\.[\da-f']+)(?:p[+-]?[\d']+)?|(?:\b[\d']+(?:\.[\d']*)?|\B\.[\d']+)(?:e[+-]?[\d']+)?)[ful]{0,4}/i, greedy: true},
      'operator': />>=?|<<=?|->|--|\+\+|&&|\|\||[?:~]|<=>|[-+*/%&|^!=<>]=?|\b(?:and|and_eq|bitand|bitor|not|not_eq|or|or_eq|xor|xor_eq)\b/,
      'boolean': /\b(?:false|true)\b/
    });
    Prism.languages.insertBefore('cpp', 'string', {
      'module': {pattern: /(\b(?:import|module)\s+)(?:"(?:\\(?:\r\n|[\s\S])|[^"\\\r\n])*"|<[^<>\r\n]*>)/, lookbehind: true, greedy: true},
      'raw-string': {pattern: /R"([^()\\ ]{0,16})\([\s\S]*?\)\1"/, alias: 'string', greedy: true}
    });

    // Docsify hook: 페이지 렌더 후 재하이라이팅
    window.$docsify.plugins = [].concat(function(hook) {
      hook.doneEach(function() {
        document.querySelectorAll('pre code[class*="lang-"]').forEach(function(el) {
          Prism.highlightElement(el);
        });
      });
    }, window.$docsify.plugins || []);
  </script>
</body>
</html>
