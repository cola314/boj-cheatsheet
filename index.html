<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BOJ 치트시트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --base-font-family: -apple-system, 'Noto Sans KR', sans-serif;
      --base-font-size: 15px;
      --code-font-family: 'JetBrains Mono', 'D2Coding', 'Fira Code', monospace;
      --code-font-size: 13px;
      --theme-color: #2563eb;
      --sidebar-width: 240px;
    }
    .markdown-section pre {
      border-radius: 6px;
      background: #2d2d2d !important;
    }
    .markdown-section pre > code {
      color: #ccc !important;
      text-shadow: none !important;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'BOJ 치트시트',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
        paths: 'auto',
      },
      auto2top: true,
      coverpage: false,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
